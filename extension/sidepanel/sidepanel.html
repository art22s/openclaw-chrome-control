<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
    }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .reset-btn {
      background: none;
      border: 1px solid #333;
      color: #888;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reset-btn:hover { color: #e0e0e0; border-color: #555; }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: #e94560;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      align-self: flex-start;
      background: #1a1a2e;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }
    .typing {
      align-self: flex-start;
      background: #1a1a2e;
      padding: 10px 14px;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      display: none;
    }
    .typing.visible { display: flex; gap: 4px; align-items: center; }
    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #888;
      animation: typingBounce 1.4s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
    }
    .input-area input {
      flex: 1;
      padding: 10px 14px;
      background: #0f0f1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
    }
    .input-area input:focus { border-color: #e94560; }
    .send-btn {
      padding: 10px 16px;
      background: #e94560;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .send-btn:hover { background: #d63851; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">🦞 OpenClaw Chat</div>
    <button class="reset-btn" id="resetBtn">Reset</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="typing" id="typing">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>

  <div class="input-area">
    <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off">
    <button class="send-btn" id="sendBtn">Send</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
