<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Chrome Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo { font-size: 28px; }
    .title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #1a1a2e;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    .status-dot.disconnected { background: #666; }
    .status-dot.connecting { background: #f90; animation: pulse 1s infinite; }
    .status-dot.error { background: #f44336; }
    .status-text { font-size: 14px; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }
    .btn-toggle {
      background: #2a2a4a;
      color: #e0e0e0;
    }
    .btn-toggle:hover { background: #3a3a5a; }
    .btn-toggle.active {
      background: #e94560;
      color: #fff;
    }
    .btn-options {
      background: none;
      color: #888;
      font-size: 13px;
      text-decoration: underline;
    }
    .btn-options:hover { color: #e0e0e0; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🦞</div>
    <div class="title">OpenClaw Chrome Control</div>
  </div>

  <div class="status">
    <div class="status-dot disconnected" id="statusDot"></div>
    <div class="status-text" id="statusText">Disconnected</div>
  </div>

  <button class="btn btn-toggle" id="toggleBtn">Connect</button>
  <button class="btn btn-options" id="optionsBtn">Options</button>

  <script src="popup.js"></script>
</body>
</html>
